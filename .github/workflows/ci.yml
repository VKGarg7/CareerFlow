name: CI

on:
  push:
    branches: [main, backend, frontend]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build and run tests
        run: |
          set -o pipefail
          mvn -B verify 2>&1 | tee build.log

      - name: Surface failure details as annotations
        if: failure()
        run: |
          grep -h "Caused by" target/surefire-reports/*.txt 2>/dev/null | sort -u | head -8 | while IFS= read -r line; do
            echo "::error::${line}"
          done
          grep -hA2 "IllegalState\|BeanCreationException\|UnsatisfiedDependency" target/surefire-reports/*.txt 2>/dev/null | head -12 | while IFS= read -r line; do
            echo "::error::${line}"
          done

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
